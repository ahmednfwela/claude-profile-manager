version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: binary
    # goreleaser appends the platform binary extension itself for binary-format
    # archives; including .exe here produced cpm_windows_amd64.exe.exe (v0.1.2).
    name_template: 'cpm_{{ .Os }}_{{ .Arch }}'

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
