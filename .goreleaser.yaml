version: 2

builds:
  - binary: cpm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/jakubkontra/cpm/internal.Version={{.Version}}
      - -X github.com/jakubkontra/cpm/internal.Commit={{.ShortCommit}}

archives:
  - format: binary
    name_template: 'cpm_{{ .Os }}_{{ .Arch }}{{ if eq .Os "windows" }}.exe{{ end }}'

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

# NOTE: the upstream `brews:` block (pushing to jakubkontra/homebrew-tap) was
# removed — this fork has no such tap and the cross-repo push has no valid token,
# which would fail every tag-triggered release. Distribution here is the raw
# GitHub Release binaries consumed by `cpm upgrade` / scoop / manual copy.
